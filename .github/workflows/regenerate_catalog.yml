name: Regenerate catalog

on:
  schedule:
    - cron: "0 3 * * *"

  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you triggering this manually? (optional)"
        required: false
        default: "manual refresh"

jobs:
  build-catalog:
    name: Build & commit catalog
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate catalog
        run: python scripts/dataset.py

      - name: Commit updated catalog
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add catalog/

          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to catalog — skipping commit."
          else
            TRIGGER="${{ github.event_name }}"
            if [ "$TRIGGER" = "workflow_dispatch" ]; then
              MSG="chore(catalog): manual regeneration — ${{ github.event.inputs.reason }}"
            else
              MSG="chore(catalog): scheduled regeneration $(date -u '+%Y-%m-%d')"
            fi
            git commit -m "$MSG"
            git push
          fi